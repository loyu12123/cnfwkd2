<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Research Archive</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

    <h1>RESEARCH ARCHIVE</h1>

    <p class="subtitle">
        Research Division Internal System
    </p>

    <div class="divider"></div>

    <p class="auth">
        Authentication Required
    </p>

    <input
        id="password"
        type="password"
        placeholder="Password"
        autocomplete="off"
    >

    <button id="loginButton">
        ACCESS ARCHIVE
    </button>

    <p id="error"></p>

</div>



<div id="loading">

    <pre id="loadingText"></pre>

</div>



<script src="script.js"></script>

</body>

</html>
